<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Journée à Paris</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #f4a7c7;
      --rose-strong: #d86b98;
      --rose-dark: #7a3152;
      --gold: #f0c26d;
      --gold-light: #ffe3a3;
      --lavender: #c6a8ff;
      --pink-soft: #ffd8e8;
      --glass: rgba(255, 255, 255, 0.10);
      --glass-border: rgba(255, 255, 255, 0.16);
      --shadow: 0 16px 45px rgba(18, 7, 31, 0.42);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 191, 219, 0.22), transparent 14%),
        radial-gradient(circle at 50% 100%, rgba(255, 202, 138, 0.10), transparent 18%),
        linear-gradient(135deg, #170f2b 0%, #3a1744 50%, #6d2d54 100%);
      color: #fff;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      left: -10%;
      right: -10%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.18;
    }
    body::before {
      top: -10%;
      height: 120px;
      background: radial-gradient(circle, rgba(255,255,255,0.8), transparent 70%);
      filter: blur(10px);
    }
    body::after {
      bottom: -15%;
      height: 180px;
      background: radial-gradient(circle at center, rgba(244,167,199,0.18), rgba(244,167,199,0) 70%);
    }

    /* Background */
    #bg-layer {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      z-index: 0;
      will-change: background-image;
    }
    #bg-overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(160deg, rgba(18,10,32,0.78) 0%, rgba(10,7,22,0.68) 55%, rgba(48,14,36,0.52) 100%),
        radial-gradient(circle at 50% 15%, rgba(243,167,196,0.10), transparent 12%);
      z-index: 1;
    }

    /* Layout */
    .wrap {
      position: relative;
      z-index: 2;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 56px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 22px;
      padding-top: 8px;
    }
    .date-badge {
      display: inline-block;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      color: #2b1d12;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 6px 18px rgba(232,191,115,0.22);
    }
    #page-title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.55);
      outline: none;
      cursor: text;
      border-bottom: 2px dashed transparent;
      transition: border-color 0.2s, background 0.2s;
      padding: 3px 6px;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    #page-title:focus {
      border-bottom-color: var(--gold);
      background: rgba(255,255,255,0.06);
    }
    #page-title:empty::before {
      content: 'Journée d\'amour à Paris';
      color: rgba(255,255,255,0.35);
    }
    .edit-hint {
      margin-top: 5px;
      font-size: 11px;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.3px;
    }

    /* ── Progress ── */
    .progress-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.08));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 14px 18px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.3px;
    }
    .progress-count {
      font-size: 13px;
      font-weight: 800;
      color: var(--gold);
    }
    .bar-track {
      background: rgba(255,255,255,0.12);
      border-radius: 8px;
      height: 7px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--gold), var(--gold-light));
      border-radius: 8px;
      transition: width 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* ── Timeline ── */
    .timeline {
      position: relative;
      padding-left: 30px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: linear-gradient(to bottom, var(--gold) 0%, rgba(212,168,67,0.15) 100%);
      border-radius: 2px;
    }

    /* ── Activity card ── */
    .act {
      position: relative;
      margin-bottom: 14px;
    }
    .act-dot {
      position: absolute;
      left: -24px;
      top: 18px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid rgba(255,255,255,0.25);
      transition: background 0.3s;
      z-index: 1;
      box-shadow: 0 0 0 3px rgba(212,168,67,0.18);
    }
    .act.done .act-dot {
      background: rgba(255,255,255,0.22);
      box-shadow: none;
    }

    .act-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.08));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 14px 15px;
      cursor: pointer;
      transition: opacity 0.35s ease, background 0.3s, border-color 0.3s, transform 0.25s ease, box-shadow 0.3s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .act-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-120%);
      transition: transform 0.7s ease;
    }
    .act-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 50px rgba(18,7,31,0.52);
    }
    .act-card:hover::before {
      transform: translateX(120%);
    }
    .act-card:active { opacity: 0.82; transform: scale(0.985); }
    .act.done .act-card {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.07);
      opacity: 0.48;
    }

    .card-inner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .card-body { flex: 1; min-width: 0; }

    .act-time {
      margin-bottom: 6px;
      transition: color 0.3s;
    }
    .act-time .time-input {
      width: 100%;
      max-width: 180px;
      background: linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.05));
      border: 1px solid rgba(243,167,196,0.18);
      border-radius: 999px;
      color: var(--gold-light);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 7px 11px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, transform 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .act-time .time-input:focus {
      background: rgba(255,255,255,0.12);
      border-color: rgba(243,167,196,0.78);
      transform: scale(1.01);
    }
    .act.done .act-time .time-input {
      color: rgba(255,255,255,0.32);
      background: rgba(255,255,255,0.04);
    }

    .act-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 7px;
      transition: text-decoration 0.3s, color 0.3s;
    }
    .act.done .act-name {
      text-decoration: line-through;
      color: rgba(255,255,255,0.4);
    }

    .act-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .act-address {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      font-size: 11.5px;
      color: rgba(255,255,255,0.58);
      line-height: 1.45;
    }
    .act-address svg { flex-shrink: 0; margin-top: 1px; }

    .act-price {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(212,168,67,0.15);
      border: 1px solid rgba(212,168,67,0.28);
      color: var(--gold-light);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      transition: all 0.3s;
    }
    .act.done .act-price {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.28);
    }

    .act-note {
      font-size: 11px;
      color: rgba(255,255,255,0.44);
      font-style: italic;
      line-height: 1.4;
    }

    /* Checkbox */
    .check-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.3s, border-color 0.3s;
    }
    .act.done .check-circle {
      background: var(--gold);
      border-color: var(--gold);
    }
    .check-circle svg {
      opacity: 0;
      transform: scale(0.4);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .act.done .check-circle svg {
      opacity: 1;
      transform: scale(1);
    }

    /* Completion message */
    .all-done-msg {
      display: none;
      text-align: center;
      margin-top: 8px;
      padding: 16px;
      background: linear-gradient(90deg, rgba(243,167,196,0.14), rgba(232,191,115,0.12));
      border: 1px solid rgba(243,167,196,0.28);
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      color: var(--gold-light);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* ── Background picker ── */
    .bg-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.07));
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 16px;
      margin-top: 26px;
      box-shadow: var(--shadow);
    }

    .romantic-decor {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }
    .petal,
    .heart,
    .sparkle {
      position: absolute;
      opacity: 0.78;
      animation: floatAround linear infinite;
    }
    .petal {
      width: 11px;
      height: 16px;
      background: linear-gradient(to bottom, #fff5f9, var(--rose-strong));
      border-radius: 0 100% 0 100%;
      transform: rotate(24deg);
      box-shadow: 0 0 10px rgba(255, 188, 219, 0.25);
      animation-duration: 14s;
    }
    .heart {
      font-size: 22px;
      color: rgba(255, 228, 242, 0.9);
      text-shadow:
        0 0 12px rgba(255, 255, 255, 0.2),
        0 0 24px rgba(244, 167, 199, 0.36);
      animation-duration: 18s;
      filter: drop-shadow(0 0 6px rgba(244,167,199,0.3));
    }
    .sparkle {
      width: 8px;
      height: 8px;
      background: radial-gradient(circle, #fff 0%, #f0c26d 70%, transparent 72%);
      border-radius: 50%;
      animation-duration: 10s;
      opacity: 0.9;
    }

    @keyframes floatAround {
      0% { transform: translateY(0) translateX(0) scale(1) rotate(0deg); }
      20% { transform: translateY(-22px) translateX(8px) scale(1.06) rotate(9deg); }
      40% { transform: translateY(0) translateX(16px) scale(0.96) rotate(18deg); }
      60% { transform: translateY(18px) translateX(6px) scale(1.08) rotate(6deg); }
      80% { transform: translateY(6px) translateX(-8px) scale(1.02) rotate(-8deg); }
      100% { transform: translateY(0) translateX(0) scale(1) rotate(0deg); }
    }
    .bg-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 12px;
    }
    .presets-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .preset-btn {
      aspect-ratio: 3/2;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      background-size: cover;
      background-position: center;
      background-color: rgba(255,255,255,0.1);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .preset-btn:active { transform: scale(0.93); }
    .preset-btn.active { border-color: var(--gold); }
    .preset-btn span {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 3px 2px;
      background: rgba(0,0,0,0.45);
      font-size: 8.5px;
      font-weight: 700;
      text-align: center;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px;
      background: rgba(255,255,255,0.06);
      border: 1.5px dashed rgba(255,255,255,0.22);
      border-radius: 12px;
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .upload-btn:active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.35);
    }
    #file-input { display: none; }
  </style>
</head>
<body>

<div class="romantic-decor" aria-hidden="true">
  <span class="heart" style="left:8%; top:15%; animation-duration: 22s;">♥</span>
  <span class="heart" style="right:10%; top:22%; animation-duration: 19s;">♡</span>
  <span class="sparkle" style="left:18%; top:24%; animation-duration: 8s;"></span>
  <span class="sparkle" style="left:70%; top:16%; animation-duration: 11s;"></span>
  <span class="sparkle" style="left:82%; top:35%; animation-duration: 9s;"></span>
  <span class="petal" style="left:20%; top:28%; animation-duration: 14s;"></span>
  <span class="petal" style="left:75%; top:18%; animation-duration: 17s;"></span>
  <span class="petal" style="left:88%; top:50%; animation-duration: 16s;"></span>
  <span class="petal" style="left:32%; top:78%; animation-duration: 19s;"></span>
  <span class="petal" style="left:68%; top:82%; animation-duration: 21s;"></span>
  <span class="sparkle" style="left:40%; top:84%; animation-duration: 12s;"></span>
</div>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="date-badge">💗 Mercredi 17 juin 2026</div>
    <h1 id="page-title" contenteditable="true" spellcheck="false"></h1>
    <p class="edit-hint">Appuie sur le titre pour le modifier · Modifie les horaires directement</p>
  </div>

  <!-- Progress -->
  <div class="progress-card">
    <div class="progress-row">
      <span class="progress-label">Progression de la journée</span>
      <span class="progress-count" id="prog-count">0 / 6</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="prog-bar"></div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline"></div>

  <!-- All done -->
  <div class="all-done-msg" id="all-done">Journée complète !</div>

  <!-- Background picker -->
  <div class="bg-card">
    <div class="bg-title">Fond d'écran</div>
    <div class="presets-grid" id="presets-grid"></div>
    <label class="upload-btn" for="file-input">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      Choisir une photo depuis mon téléphone
    </label>
    <input type="file" id="file-input" accept="image/*">
  </div>

</div>

<script>
// ─── Data ──────────────────────────────────────────────────────────────────
const ACTIVITIES = [
  {
    id: 1,
    time: "08h00 – 10h00",
    name: "Petit-déjeuner – Brasserie L'Europeen",
    address: "21 bis Bd Diderot, 75012 Paris (face à la Gare de Lyon)",
    price: "~11 €",
    note: 'Formule "Le Complet"'
  },
  {
    id: 2,
    time: "10h30 – 12h00",
    name: "Aquarium de Paris",
    address: "5 Av. Albert de Mun, 75016 Paris",
    price: "~23 €",
    note: "Ne pas manquer : le Medusarium"
  },
  {
    id: 3,
    time: "12h15 – 13h45",
    name: "Déjeuner – choix libre de Laurane",
    address: "Selon son envie du moment, où elle veut manger",
    price: "À choisir",
    note: "Laurane choisit elle-même le lieu et ce qu'elle veut manger"
  },
  {
    id: 4,
    time: "14h00 – 15h30",
    name: "Musée d'Art Moderne de Paris",
    address: "11 Av. du Président Wilson, 75116 Paris",
    price: "Gratuit",
    note: "Collection permanente · Ouvert le mercredi"
  },
  {
    id: 5,
    time: "16h00 – 17h30",
    name: "Laser Game – Laser World Paris",
    address: "168 Bd du Montparnasse, 75014 Paris",
    price: "~9 – 15 €",
    note: "Réservation conseillée · Tél : 01 43 35 17 91"
  },
  {
    id: 6,
    time: "18h00",
    name: "Tour Eiffel",
    address: "Côté Trocadéro, Paris 16e",
    price: "Vue gratuite",
    note: "La plus belle vue sur la Dame de Fer · Point final de la journée"
  }
];

const PRESETS = [
  {
    label: "Tour Eiffel",
    bg:  "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=900&q=80",
    th:  "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=160&q=60"
  },
  {
    label: "Paris nuit",
    bg:  "https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=900&q=80",
    th:  "https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=160&q=60"
  },
  {
    label: "Montmartre",
    bg:  "https://images.unsplash.com/photo-1550340499-a6c60fc8287c?w=900&q=80",
    th:  "https://images.unsplash.com/photo-1550340499-a6c60fc8287c?w=160&q=60"
  },
  {
    label: "La Seine",
    bg:  "https://images.unsplash.com/photo-1541264827959-d2a6b7dc5e3e?w=900&q=80",
    th:  "https://images.unsplash.com/photo-1541264827959-d2a6b7dc5e3e?w=160&q=60"
  }
];

// ─── State ─────────────────────────────────────────────────────────────────
let checked  = JSON.parse(localStorage.getItem('p_checked') || '[]');
let activeBg = localStorage.getItem('p_bg') || PRESETS[0].bg;
let hasCustom = false;
let savedTimes = JSON.parse(localStorage.getItem('p_times') || '{}');

// ─── Activities ────────────────────────────────────────────────────────────
function iconPin() {
  return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
}
function iconEuro() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M14.5 8a4 4 0 100 8M8 11h7M8 13h7"/></svg>`;
}
function iconCheck() {
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
}

function getActivityTime(activity) {
  return savedTimes[activity.id] || activity.time;
}

function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = ACTIVITIES.map(a => {
    const done = checked.includes(a.id);
    const timeValue = getActivityTime(a);
    return `
      <div class="act${done ? ' done' : ''}" id="act-${a.id}" onclick="toggleAct(${a.id})">
        <div class="act-dot"></div>
        <div class="act-card">
          <div class="card-inner">
            <div class="card-body">
              <div class="act-time">
                <input class="time-input" data-id="${a.id}" value="${timeValue}" aria-label="Modifier l'horaire de l'activité">
              </div>
              <div class="act-name">${a.name}</div>
              <div class="act-meta">
                <div class="act-address">${iconPin()}&nbsp;${a.address}</div>
              </div>
              <div class="act-price">${iconEuro()}&nbsp;${a.price}</div>
              ${a.note ? `<div class="act-note" style="margin-top:6px">${a.note}</div>` : ''}
            </div>
            <div class="check-circle">${iconCheck()}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.querySelectorAll('.time-input').forEach(input => {
    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('focus', e => e.target.select());
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        e.target.blur();
      }
    });
    input.addEventListener('blur', e => {
      const id = Number(e.target.dataset.id);
      const raw = e.target.value.trim();
      const activity = ACTIVITIES.find(a => a.id === id);
      const newValue = raw || activity.time;
      savedTimes[id] = newValue;
      localStorage.setItem('p_times', JSON.stringify(savedTimes));
      e.target.value = newValue;
    });
  });
}

function toggleAct(id) {
  const el = document.getElementById('act-' + id);
  if (checked.includes(id)) {
    checked = checked.filter(x => x !== id);
    el.classList.remove('done');
  } else {
    checked.push(id);
    el.classList.add('done');
  }
  localStorage.setItem('p_checked', JSON.stringify(checked));
  refreshProgress();
}

function refreshProgress() {
  const n = checked.length, total = ACTIVITIES.length;
  document.getElementById('prog-count').textContent = n + ' / ' + total;
  document.getElementById('prog-bar').style.width = (n / total * 100) + '%';
  document.getElementById('all-done').style.display = n === total ? 'block' : 'none';
}

// ─── Background ────────────────────────────────────────────────────────────
function applyBg(url) {
  document.getElementById('bg-layer').style.backgroundImage = "url('" + url + "')";
}

function selectPreset(url) {
  activeBg = url;
  hasCustom = false;
  localStorage.setItem('p_bg', url);
  applyBg(url);
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.bg === url);
  });
}

function buildPresets() {
  const grid = document.getElementById('presets-grid');
  grid.innerHTML = PRESETS.map(p => `
    <div class="preset-btn${p.bg === activeBg ? ' active' : ''}"
         data-bg="${p.bg}"
         style="background-image:url('${p.th}')"
         onclick="selectPreset('${p.bg}')">
      <span>${p.label}</span>
    </div>`).join('');
}

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const data = ev.target.result;
    hasCustom = true;
    applyBg(data);
    try { localStorage.setItem('p_custom_bg', data); } catch(_) {}
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  };
  reader.readAsDataURL(file);
});

// ─── Title ─────────────────────────────────────────────────────────────────
const titleEl = document.getElementById('page-title');
const savedTitle = localStorage.getItem('p_title');
titleEl.textContent = savedTitle !== null ? savedTitle : 'Journée d\'amour à Paris';

titleEl.addEventListener('blur', () => {
  localStorage.setItem('p_title', titleEl.textContent);
});
titleEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
});

// ─── Init ───────────────────────────────────────────────────────────────────
buildTimeline();
buildPresets();
refreshProgress();

const customBg = localStorage.getItem('p_custom_bg');
if (customBg) {
  applyBg(customBg);
  hasCustom = true;
} else {
  applyBg(activeBg);
}
</script>
</body>
</html>
